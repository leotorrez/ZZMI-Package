namespace = zHealthbar

[Constants]
global $active = 0

global $character_counter = 0
global $hp_counter = 0
global $icon_counter = 0
global $store_temp = -1

global $hp_main = -1
global $hp_team_1 = -1
global $hp_team_2 = -1

global $next_update = 0
global $update_request = 0

[Present]
post run = CommandList.Clear

[CommandList.Clear]
if $active
	$active = $active - 1
	if $update_request
		$update_request = $update_request - 1
	endif
	if $hp_counter
		$character_counter = $hp_counter
		$hp_counter = 0
	endif
	if (time > $next_update)
		if $icon_counter
			$icon_counter = 0
		endif
		$hp_main = -1
		$hp_team_1 = -1
		$hp_team_2 = -1

		$next_update = time + 0.3
	endif
elif $character_counter
	$character_counter = 0
endif


[ShaderOverridez UI Icons VS]
hash = cdc90aee00e7900d
allow_duplicate_hash = true
filter_index = 909.709
[ShaderOverridez UI Icons PS]
hash = 857cd16250c6142e
allow_duplicate_hash = true
if $update_request && $active && vs == 909.709
	if ps-t0 == 180.64
		if $icon_counter < $character_counter
			if $\ZZMIv1\check_textures != 2
				CheckTextureOverride = ps-t0
			endif
			if $icon_counter == 0
				$\Healthbar\character_id_0 = $\Healthbar\character_id
				if $character_counter == 1
					run = CommandList.SetValue
				endif
			elif $icon_counter == 1
				$\Healthbar\character_id_1 = $\Healthbar\character_id
				if $character_counter == 2
					run = CommandList.SetValue
				endif
			elif $icon_counter == 2
				$\Healthbar\character_id_2 = $\Healthbar\character_id
				if $character_counter == 3
					run = CommandList.SetValue
				endif
			endif
		endif
		
		$icon_counter = $icon_counter + 1
	endif
endif

[CommandList.SetValue]
$\Healthbar\current_id = $\Healthbar\character_id_0
$\Healthbar\current_value = $hp_main
run = CommandList\Healthbar\SetValue

$\Healthbar\current_id = $\Healthbar\character_id_1
$\Healthbar\current_value = $hp_team_1
run = CommandList\Healthbar\SetValue

$\Healthbar\current_id = $\Healthbar\character_id_2
$\Healthbar\current_value = $hp_team_2
run = CommandList\Healthbar\SetValue

[TextureOverridez Icons]
match_type = Texture2D
match_format = BC3_UNORM_SRGB
match_width = 180
match_height = 64
match_mips = 1
match_index_count = 6
match_priority = 999
filter_index = 180.64


[Resource.UAV]
type = RWBuffer
format = R32_FLOAT
array = 3
data = 0 0 0
[CustomShader.SummHp]
flags = optimization_level3 all_resources_bound partial_precision skip_validation
cs = SummHp.CS.hlsl

local $x1 = x1
local $y1 = y1

x1 = $hp_counter // 1
y1 = $character_counter // 1

cs-u0 = ref Resource.UAV
cs-t0 = ps-cb0
Dispatch = 1, 1, 1

x1 = $x1
y1 = $y1

[ShaderOverridez UI Hp bar VS]
hash = 0086a8159f4d9a00
allow_duplicate_hash = true
filter_index = 8681.5949
[ShaderOverridez UI Hp bar PS]
hash = dce9c76d7f184caf
if $costume_mods && vs == 8681.5949
	local $t0 = ps-t0
	if $t0 == 1024.54 || $t0 == 1024.6
		$active = 3
		if $update_request
			if $hp_counter == 0
				run = CustomShader.SummHp
				if $character_counter == 1 && $hp_main == -1
					run = CommandList.StoreValue
				endif
			elif $hp_counter == 1
				run = CustomShader.SummHp
				if $character_counter == 2 && $hp_team_1 == -1
					run = CommandList.StoreValue
				endif
			elif $hp_counter == 2
				run = CustomShader.SummHp
				if $character_counter == 3 && $hp_team_2 == -1
					run = CommandList.StoreValue
				endif
			endif
		endif
		
		$hp_counter = $hp_counter + 1
	endif
endif

[CommandList.StoreValue]
store = $store_temp, ref Resource.UAV, 2
$hp_main = (($store_temp // (101**2)) % 101) / 100
$hp_team_1 = (($store_temp // 101) % 101) / 100
$hp_team_2 = ($store_temp % 101) / 100

[TextureOverridez HealthBar current]
match_type = Texture2D
match_format = BC3_UNORM_SRGB
match_width = 1024
match_height = 1024
match_mips = 1
match_index_count = 54
match_priority = 999
filter_index = 1024.54

[TextureOverridez HealthBar team]
match_type = Texture2D
match_format = BC3_UNORM_SRGB
match_width = 1024
match_height = 1024
match_mips = 1
match_index_count = 6
match_first_index = >600
match_priority = 999
filter_index = 1024.6
